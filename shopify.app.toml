# 24K Multi-Barcode POS Scanner
# This file is linked to a Shopify app by running: npm run dev
# Shopify CLI will update/create the app configuration during login/linking.

name = "24K Multi-Barcode POS Scanner"
client_id = ""
application_url = "https://example.com"
embedded = true
handle = "24k-multi-barcode-pos-scanner"

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[access_scopes]
scopes = "read_products,write_products"

[auth]
redirect_urls = [
  "https://example.com/auth/callback",
  "https://example.com/auth/shopify/callback",
  "https://example.com/api/auth/callback"
]

[webhooks]
api_version = "2025-10"

[pos]
embedded = false
